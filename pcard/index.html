<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Pad</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="container">
        <div class="image">
            <p class="price">$100</p>
            <img src="pd1.png" alt="Game Pad Image" width="100%">
        </div>
        <div class="text">
            <div class="left">
                <h2>PS5 Game Pad</h2>
                <p>Experience next-level immersion with the PlayStation 5 DualSense Wireless Controller.</p>
                <div class="stars">
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                </div>
            </div>
            <div class="right">
                <h3>Compatibility</h3>
                <p>PlayStation 5, PC (via USB or Bluetooth)</p>
                <h3>Battery Life</h3>
                <p>Rechargeable lithium-ion</p>
                <h3>Features</h3>
                <p>Haptic feedback, adaptive triggers, motion sensors</p>
            </div>
        </div>
        <button>ADD TO CART</button>
    </div>
</body>
</html>
