<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TailsPage</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="">
    <div class="container flex items-center justify-center h-screen gap-20 mx-auto h-full">
        <div class="frm flex flex-col items-center justify-center p-10 h-full">
            <h2 class="text-xl text-center font-bold">Sign in</h2>
            <div class="socials flex gap-4 mt-4 justify-center">
                <a href="#"><img width="30" src="https://img.icons8.com/3d-sugary/69/facebook.png" alt="facebook"/></a>
                <a href="#"><img width="30" src="https://img.icons8.com/3d-sugary/69/google-plus.png" alt="google"/></a>
                <a href="#"><img width="30"  src="https://img.icons8.com/3d-sugary/100/linkedin.png" alt="linkedin"/></a>
            </div>
            <p class="text-center mt-4">or use your account</p>
            <form class="flex flex-col gap-4 mt-4 text-center">
                <input class="bg-gray-200 p-2" type="email" placeholder="Email" name="email" id="email">
                <input class="bg-gray-200 p-2" type="password" placeholder="Password" name="password" id="password">
                <a href="#" class="text-lg ">Forgot your password?</a>
                <button class="bg-orange-600 text-white py-2 rounded-full font-bold" type="submit">SIGN IN</button>
            </form>
        </div>
        <div class="dsn bg-orange-600 text-white p-10 h-full flex flex-col items-center justify-center gap-4">
            <h1 class="font-bold text-xl">Hello, Friend!</h1>
            <p class="mt-4 text-center">Enter your personal details and start journey with us</p>
            <button class="bg-orange-600 text-white border py-2 px-5 rounded-full">SIGN UP</button>
        </div>
    </div>
</body>
</html>
