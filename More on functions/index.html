<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <section class="card">
            <img src="#" alt="Ijapo">
            <div class="estate">
                <h2 class="title">Ijapo, Ondo</h2>
                <p class="price">$100,000</p>
                <p class="about">Highly desirable location in stunning scenery</p>
                <h5 class="distant">62m</h5>
            </div>
        </section>
        <section class="card">
            <img src="#" alt="Leki">
            <div class="estate">
            <h2 class="title">Lekki, Lagos</h2>
            <p class="price">$200,000</p>
            <p class="about">Astonishing view with a modern finish!</p>
            <h5 class="distant">116m</h5>
        </div>
        </section>
        <section class="card">
            <img src="#" alt="Ikoyi">
            <div class="estate">
                <h2 class="title">Ikoyi, Lagos</h2>
                <p class="price">$250,000</p>
                <p class="about">Beautiful interior and a spacious room</p>
                <h5 class="distant">6m</h5>
            </div>
        </section>
        <section class="card">
            <img src="#" alt="Ajah">
            <div class="estate">
                <h2 class="title">Ajah</h2>
                <p class="price">$500,000</p>
                <p class="about">Lots of potential snug, a must see!</p>
                <h5 class="distant">34m</h5>
            </div>
        </section>
    </div>
    <script src="index.js" type="module"></script>
</body>
</html>
